<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星际之门 - 交互式宇宙之旅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: none;
        }

        #mainCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        .ui-overlay {
            position: fixed;
            pointer-events: none;
            z-index: 10;
        }

        .title {
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #fff;
        }

        .title h1 {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 20px;
            text-transform: uppercase;
            text-shadow: 0 0 30px rgba(100, 200, 255, 0.8),
                         0 0 60px rgba(100, 200, 255, 0.5);
            animation: glow 3s ease-in-out infinite;
        }

        .title p {
            font-size: 16px;
            letter-spacing: 5px;
            opacity: 0.7;
            margin-top: 10px;
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 30px rgba(100, 200, 255, 0.8),
                             0 0 60px rgba(100, 200, 255, 0.5);
            }
            50% {
                text-shadow: 0 0 40px rgba(100, 200, 255, 1),
                             0 0 80px rgba(100, 200, 255, 0.8),
                             0 0 100px rgba(100, 200, 255, 0.5);
            }
        }

        .controls-hint {
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            text-align: center;
            opacity: 0.6;
            font-size: 14px;
            letter-spacing: 2px;
            animation: fadeInOut 4s ease-in-out infinite;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .stats {
            position: fixed;
            top: 50%;
            right: 50px;
            transform: translateY(-50%);
            color: #fff;
            text-align: right;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .stats div {
            margin-bottom: 10px;
            opacity: 0.6;
        }

        .stats span {
            color: #64c8ff;
            font-weight: bold;
        }

        .custom-cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid #64c8ff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: transform 0.1s, border-color 0.3s;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
        }

        .custom-cursor.clicking {
            transform: translate(-50%, -50%) scale(0.8);
            border-color: #ff64c8;
            box-shadow: 0 0 30px rgba(255, 100, 200, 1);
        }

        @media (max-width: 768px) {
            .title h1 {
                font-size: 32px;
                letter-spacing: 10px;
            }
            
            .stats {
                display: none;
            }
            
            .mode-switcher {
                bottom: 50px;
                right: 20px;
            }
        }
    </style>
</head>
<body>
    <canvas id="mainCanvas"></canvas>
    
    <div class="custom-cursor" id="cursor"></div>
    
    <div class="ui-overlay title">
        <h1>星际之门</h1>
        <p>交互式宇宙之旅</p>
    </div>
    
    <div class="ui-overlay stats">
        <div>粒子数: <span id="particleCount">0</span></div>
        <div>FPS: <span id="fps">60</span></div>
        <div>交互: <span id="interactions">0</span></div>
    </div>
    
    <div class="ui-overlay controls-hint">
        移动鼠标探索 • 点击创造能量波 • 按住拖动产生引力场
    </div>

    <script>
        // ==================== 核心应用 ====================
        class CosmicJourney {
            constructor() {
                this.canvas = document.getElementById('mainCanvas');
                this.ctx = this.canvas.getContext('2d');
                
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.dpr = Math.min(window.devicePixelRatio || 1, 2);
                
                this.canvas.width = this.width * this.dpr;
                this.canvas.height = this.height * this.dpr;
                this.canvas.style.width = this.width + 'px';
                this.canvas.style.height = this.height + 'px';
                this.ctx.scale(this.dpr, this.dpr);
                
                this.mouse = { x: this.width / 2, y: this.height / 2, down: false };
                this.interactions = 0;
                this.currentMode = 'starfield';
                this.time = 0;
                
                this.particles = [];
                this.maxParticles = this.detectMaxParticles();
                
                this.energyWaves = [];
                this.gravityFields = [];
                
                this.fps = 60;
                this.frameCount = 0;
                this.lastFPSCheck = performance.now();
                
                this.setupEvents();
                this.initStarfield();
                this.animate();
            }
            
            detectMaxParticles() {
                const isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
                const isLowEnd = navigator.hardwareConcurrency <= 2;
                return isLowEnd ? 800 : isMobile ? 1500 : 3000;
            }
            
            // ==================== 星空模式初始化 ====================
            initStarfield() {
                for (let i = 0; i < this.maxParticles; i++) {
                    this.particles.push({
                        x: (Math.random() - 0.5) * this.width * 2,
                        y: (Math.random() - 0.5) * this.height * 2,
                        z: Math.random() * this.width,
                        pz: 0,
                        size: Math.random() * 2 + 0.5,
                        color: `hsl(${200 + Math.random() * 40}, 80%, ${70 + Math.random() * 30}%)`,
                        twinkle: Math.random() * Math.PI * 2,
                        twinkleSpeed: Math.random() * 0.03 + 0.01
                    });
                }
            }
            
            // ==================== 更新逻辑 ====================
            update() {
                this.time += 0.016;
                this.updateStarfield();
                this.updateEnergyWaves();
                this.updateGravityFields();
            }
            
            updateStarfield() {
                const centerX = this.width / 2 + (this.mouse.x - this.width / 2) * 0.1;
                const centerY = this.height / 2 + (this.mouse.y - this.height / 2) * 0.1;
                const speed = this.mouse.down ? 8 : 2;
                
                this.particles.forEach(p => {
                    p.pz = p.z;
                    p.z -= speed;
                    p.twinkle += p.twinkleSpeed;
                    
                    if (p.z <= 0) {
                        p.z = this.width;
                        p.pz = p.z;
                        p.x = (Math.random() - 0.5) * this.width * 2;
                        p.y = (Math.random() - 0.5) * this.height * 2;
                    }
                });
            }
            
            updateEnergyWaves() {
                for (let i = this.energyWaves.length - 1; i >= 0; i--) {
                    const wave = this.energyWaves[i];
                    wave.radius += wave.speed;
                    wave.alpha *= 0.98;
                    
                    if (wave.alpha < 0.01 || wave.radius > wave.maxRadius) {
                        this.energyWaves.splice(i, 1);
                    }
                }
            }
            
            updateGravityFields() {
                for (let i = this.gravityFields.length - 1; i >= 0; i--) {
                    const field = this.gravityFields[i];
                    field.life--;
                    field.radius = (field.maxLife - field.life) * 2;
                    field.alpha = field.life / field.maxLife;
                    
                    if (field.life <= 0) {
                        this.gravityFields.splice(i, 1);
                    }
                }
            }
            
            // ==================== 渲染系统 ====================
            render() {
                const ctx = this.ctx;
                ctx.clearRect(0, 0, this.width, this.height);
                
                this.renderStarfield();
                this.renderEnergyWaves();
                this.renderGravityFields();
                
                // 更新统计
                this.frameCount++;
                const now = performance.now();
                if (now - this.lastFPSCheck >= 1000) {
                    this.fps = this.frameCount;
                    this.frameCount = 0;
                    this.lastFPSCheck = now;
                    document.getElementById('fps').textContent = this.fps;
                    document.getElementById('particleCount').textContent = this.particles.length;
                    document.getElementById('interactions').textContent = this.interactions;
                }
            }
            
            renderStarfield() {
                const ctx = this.ctx;
                const centerX = this.width / 2 + (this.mouse.x - this.width / 2) * 0.1;
                const centerY = this.height / 2 + (this.mouse.y - this.height / 2) * 0.1;
                
                this.particles.forEach(p => {
                    const x = (p.x / p.z) * 300 + centerX;
                    const y = (p.y / p.z) * 300 + centerY;
                    
                    const px = (p.x / p.pz) * 300 + centerX;
                    const py = (p.y / p.pz) * 300 + centerY;
                    
                    const radius = Math.max(0.5, (1 - p.z / this.width) * 3);
                    const alpha = 0.5 + 0.5 * Math.sin(p.twinkle);
                    
                    // 星轨
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(100, 200, 255, ${alpha * 0.3})`;
                    ctx.lineWidth = radius * 0.5;
                    ctx.moveTo(px, py);
                    ctx.lineTo(x, y);
                    ctx.stroke();
                    
                    // 星星
                    ctx.beginPath();
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = alpha;
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 1;
                });
            }
            
            renderEnergyWaves() {
                const ctx = this.ctx;
                
                this.energyWaves.forEach(wave => {
                    ctx.beginPath();
                    ctx.strokeStyle = wave.color;
                    ctx.globalAlpha = wave.alpha;
                    ctx.lineWidth = 3;
                    ctx.arc(wave.x, wave.y, wave.radius, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                });
            }
            
            renderGravityFields() {
                const ctx = this.ctx;
                
                this.gravityFields.forEach(field => {
                    const gradient = ctx.createRadialGradient(
                        field.x, field.y, 0,
                        field.x, field.y, field.radius
                    );
                    gradient.addColorStop(0, `rgba(100, 200, 255, ${field.alpha * 0.3})`);
                    gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(field.x, field.y, field.radius, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
            
            // ==================== 动画循环 ====================
            animate() {
                this.update();
                this.render();
                requestAnimationFrame(() => this.animate());
            }
            
            // ==================== 事件处理 ====================
            setupEvents() {
                window.addEventListener('resize', () => this.handleResize());
                
                this.canvas.addEventListener('mousemove', (e) => {
                    this.mouse.x = e.clientX;
                    this.mouse.y = e.clientY;
                    this.updateCursor();
                });
                
                this.canvas.addEventListener('mousedown', (e) => {
                    this.mouse.down = true;
                    this.interactions++;
                    this.createEnergyWave(e.clientX, e.clientY);
                    document.getElementById('cursor').classList.add('clicking');
                });
                
                this.canvas.addEventListener('mouseup', () => {
                    this.mouse.down = false;
                    document.getElementById('cursor').classList.remove('clicking');
                });
                
                this.canvas.addEventListener('mouseleave', () => {
                    this.mouse.down = false;
                });
                
                // 触摸支持
                this.canvas.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    this.mouse.x = touch.clientX;
                    this.mouse.y = touch.clientY;
                    this.mouse.down = true;
                    this.interactions++;
                    this.createEnergyWave(touch.clientX, touch.clientY);
                }, { passive: false });
                
                this.canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const touch = e.touches[0];
                    this.mouse.x = touch.clientX;
                    this.mouse.y = touch.clientY;
                }, { passive: false });
                
                this.canvas.addEventListener('touchend', () => {
                    this.mouse.down = false;
                });
            }
            
            handleResize() {
                this.width = window.innerWidth;
                this.height = window.innerHeight;
                this.canvas.width = this.width * this.dpr;
                this.canvas.height = this.height * this.dpr;
                this.canvas.style.width = this.width + 'px';
                this.canvas.style.height = this.height + 'px';
                this.ctx.scale(this.dpr, this.dpr);
                this.initMode();
            }
            
            updateCursor() {
                const cursor = document.getElementById('cursor');
                cursor.style.left = this.mouse.x + 'px';
                cursor.style.top = this.mouse.y + 'px';
            }
            
            createEnergyWave(x, y) {
                this.energyWaves.push({
                    x: x,
                    y: y,
                    radius: 0,
                    maxRadius: 500,
                    speed: 8,
                    alpha: 0.8,
                    color: this.mouse.down ? '#ff64c8' : '#64c8ff'
                });
                
                // 产生引力场效果
                if (this.currentMode === 'nebula') {
                    this.gravityFields.push({
                        x: x,
                        y: y,
                        radius: 0,
                        maxRadius: 300,
                        life: 100,
                        maxLife: 100,
                        alpha: 1
                    });
                }
            }
        }

        // ==================== 启动应用 ====================
        const app = new CosmicJourney();
    </script>
</body>
</html>
